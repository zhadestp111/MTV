<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTV</title>
<style>
  :root {
    --bg-primary:   #0a0e1a;
    --bg-secondary: #0d1220;
    --bg-card:      #111827;
    --bg-hover:     #1a2235;
    --bg-active:    #1d4ed8;
    --bg-active-h:  #2563eb;
    --text-primary: #f1f5f9;
    --text-muted:   #64748b;
    --text-sub:     #94a3b8;
    --accent:       #3b82f6;
    --accent-glow:  rgba(59,130,246,0.25);
    --border:       #1e2d45;
    --border-light: #253350;
    --success:      #22c55e;
    --warning:      #f59e0b;
    --danger:       #ef4444;
    --info:         #60a5fa;
    --sidebar-w:    260px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; font-family: system-ui, -apple-system, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif; background: var(--bg-primary); color: var(--text-primary); user-select: none; -webkit-tap-highlight-color: transparent; }
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
  #topbar {
    position: fixed; top: 0; left: 0; right: 0; height: 48px; z-index: 100;
    background: linear-gradient(180deg, #060b16 0%, rgba(6,11,22,0.95) 100%);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 16px; gap: 12px;
  }
  #topbar .logo { display: none; }
  #url-input {
    flex: 1; height: 34px; background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text-primary); font-size: 13px; padding: 0 12px;
    outline: none; transition: border-color 0.2s;
  }
  #url-input::placeholder { color: var(--text-muted); }
  #url-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }
  .btn {
    height: 34px; padding: 0 14px; border: none; border-radius: 6px;
    font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; gap: 6px; flex-shrink: 0;
  }
  .btn-primary { background: var(--bg-active); color: #fff; }
  .btn-primary:hover { background: var(--bg-active-h); }
  .btn-ghost { background: var(--bg-card); color: var(--text-sub); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--bg-hover); color: var(--text-primary); }
  #file-btn { position: relative; overflow: hidden; }
  #file-btn input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  #settings-btn { font-size: 17px; padding: 0 10px; }
  #main {
    position: fixed; top: 48px; bottom: 0; left: 0; right: 0; display: flex;
    transition: all 0.3s ease;
  }
  #main.sidebar-hidden #sidebar { display: none; }
  #sidebar {
    width: var(--sidebar-w); height: 100%; background: var(--bg-secondary);
    border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden;
  }
  #group-nav {
    flex-shrink: 0; padding: 8px 8px 0; display: flex; flex-wrap: wrap; gap: 4px;
    border-bottom: 1px solid var(--border); padding-bottom: 8px; max-height: 110px; overflow-y: auto;
  }
  .group-tag {
    padding: 3px 9px; border-radius: 4px; font-size: 12px; cursor: pointer;
    background: var(--bg-card); color: var(--text-muted); border: 1px solid var(--border);
    transition: all 0.15s; white-space: nowrap;
    display: inline-flex; align-items: center; gap: 3px;
  }
  .group-tag:hover { background: var(--bg-hover); color: var(--text-sub); }
  .group-tag.active { background: var(--bg-active); color: #fff; border-color: var(--bg-active); }
  .group-tag.detecting { border-color: var(--warning); }
  .gt-detect {
    font-size: 10px; cursor: pointer; opacity: 0.35; line-height: 1;
    padding: 0 2px; border-radius: 2px; transition: all 0.15s; flex-shrink: 0;
  }
  .gt-detect:hover { opacity: 1; background: rgba(59,130,246,0.25); }
  .group-tag.detecting .gt-detect { opacity: 1; color: var(--warning); animation: pulse-dot 0.6s ease-in-out infinite; }
  #channel-list { flex: 1; overflow-y: auto; padding: 4px 0; }
  .channel-item {
    display: flex; align-items: center; padding: 7px 12px; cursor: pointer;
    transition: background 0.12s; gap: 8px; position: relative;
  }
  .channel-item:hover { background: var(--bg-hover); }
  .channel-item.active { background: var(--bg-active); }
  .channel-item.active .ch-name { color: #fff; }
  .ch-index { font-size: 11px; color: var(--text-muted); min-width: 24px; text-align: right; flex-shrink: 0; }
  .channel-item.active .ch-index { color: rgba(255,255,255,0.6); }
  .ch-name { font-size: 14px; color: var(--text-sub); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ch-fav { font-size: 13px; color: var(--text-muted); cursor: pointer; padding: 2px; flex-shrink: 0; opacity: 0; transition: opacity 0.15s; }
  .channel-item:hover .ch-fav, .channel-item.active .ch-fav { opacity: 1; }
  .ch-fav.is-fav { opacity: 1; color: var(--warning); }
  .ch-lines { font-size: 10px; color: var(--text-muted); flex-shrink: 0; }
  .channel-item.active .ch-lines { color: rgba(255,255,255,0.5); }
  /* 底部线路导航 */
  #bottom-lines {
    display: flex; align-items: center; gap: 6px; overflow-x: auto;
    flex: 1; padding: 0 4px; min-width: 0;
    scrollbar-width: none; -ms-overflow-style: none;
  }
  #bottom-lines::-webkit-scrollbar { display: none; }
  .bottom-line-item {
    padding: 3px 10px; border-radius: 6px; font-size: 12px; cursor: pointer;
    background: var(--bg-card); color: var(--text-sub); border: 1px solid var(--border);
    transition: all 0.12s; white-space: nowrap; flex-shrink: 0;
    display: flex; align-items: center; gap: 4px; line-height: 1.3;
  }
  .bottom-line-item:hover { background: var(--bg-hover); color: var(--text-primary); border-color: var(--border-light); }
  .bottom-line-item.active { background: var(--bg-active); color: #fff; border-color: var(--bg-active); }
  .bottom-line-item.active .bl-speed { color: rgba(255,255,255,0.8); }
  .bl-num { font-weight: 700; font-size: 12px; opacity: 0.7; }
  .bottom-line-item.active .bl-num { opacity: 1; }
  .bl-speed {
    font-size: 11px; font-weight: 700; font-variant-numeric: tabular-nums;
  }
  .bl-speed.ok { color: var(--success); }
  .bl-speed.err { color: var(--danger); }
  .bl-speed.fail { color: var(--info); }
  .bl-speed.unknown { color: var(--text-muted); }
  .bl-speed.testing { color: var(--warning); animation: pulse-dot 0.6s ease-in-out infinite; }
  #player-area {
    flex: 1; height: 100%; display: flex; flex-direction: column; overflow: hidden; position: relative; background: #000;
  }
  #video-wrap { flex: 1; position: relative; overflow: hidden; background: #000; }
  #video-el { width: 100%; height: 100%; object-fit: contain; background: #000; display: block; }
  #overlay {
    position: absolute; inset: 0; pointer-events: none; opacity: 0; transition: opacity 0.3s;
  }
  #overlay.show { opacity: 1; }
  #overlay-tr {
    position: absolute; top: 16px; right: 20px; display: flex; align-items: center; gap: 12px;
  }
  .ov-badge {
    background: rgba(0,0,0,0.6); backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 5px;
    padding: 4px 10px; font-size: 14px; color: var(--text-primary);
  }
  #overlay-bl {
    position: absolute; bottom: 20px; left: 20px;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 12px 20px;
  }
  #ov-ch-name { font-size: 26px; font-weight: 700; color: #fff; line-height: 1.2; }
  #ov-status { font-size: 13px; color: var(--text-sub); margin-top: 4px; display: flex; gap: 14px; }
  .ov-dot-live { width: 7px; height: 7px; border-radius: 50%; background: var(--success); display: inline-block; animation: blink 1.5s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  #empty-state {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px; background: var(--bg-primary);
  }
  #empty-state .es-icon { font-size: 60px; opacity: 0.3; }
  #empty-state .es-title { font-size: 18px; color: var(--text-muted); }
  #empty-state .es-hint { font-size: 13px; color: var(--text-muted); opacity: 0.6; max-width: 320px; text-align: center; line-height: 1.6; }
  #loading-mask {
    position: absolute; inset: 0; background: rgba(0,0,0,0.7);
    display: none; align-items: center; justify-content: center; flex-direction: column; gap: 12px;
  }
  #loading-mask.show { display: flex; }
  .spinner {
    width: 40px; height: 40px; border: 3px solid rgba(59,130,246,0.2);
    border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to{transform:rotate(360deg)} }
  .loading-text { font-size: 13px; color: var(--text-sub); }
  #info-bar {
    flex-shrink: 0; height: 50px; background: var(--bg-secondary);
    border-top: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; gap: 20px;
  }
  #info-ch-name { font-size: 15px; font-weight: 600; color: var(--text-primary); min-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .info-tag {
    font-size: 12px; padding: 2px 7px; border-radius: 3px;
    background: var(--bg-card); color: var(--text-sub); border: 1px solid var(--border); flex-shrink: 0;
  }
  .info-tag.live { border-color: var(--success); color: var(--success); }
  .info-tag.err { border-color: var(--danger); color: var(--danger); }
  #info-time { margin-left: auto; font-size: 13px; color: var(--text-muted); flex-shrink: 0; }
  .info-sep { color: var(--border-light); }
  #sidebar-toggle-bar {
    width: 18px; height: 100%; flex-shrink: 0; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg-secondary); border-left: 1px solid var(--border);
    transition: all 0.2s; user-select: none;
  }
  #sidebar-toggle-bar:hover { background: var(--bg-hover); }
  #sidebar-toggle-arrow {
    font-size: 12px; color: var(--text-muted); transition: transform 0.3s;
  }
  #main.sidebar-hidden #sidebar-toggle-arrow { transform: rotate(180deg); }
  /* 视频覆盖层信息区 */
  #player-bottom-bar {
    position: absolute; bottom: 0; left: 0; right: 0; height: 42px;
    background: rgba(6,11,22,0.88); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-top: 1px solid rgba(255,255,255,0.08);
    display: flex; align-items: center; padding: 0 8px; gap: 8px;
    z-index: 20; transition: opacity 0.3s, transform 0.3s;
  }
  #player-bottom-bar.hidden { opacity: 0; transform: translateY(4px); pointer-events: none; }
  #bottom-controls {
    display: flex; align-items: center; gap: 6px; flex-shrink: 0;
  }
  /* 重试按钮 */
  .bl-codec {
    font-size: 9px; font-weight: 600; padding: 1px 4px; border-radius: 3px;
    background: rgba(255,255,255,0.08); color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.3px;
    flex-shrink: 0; line-height: 1.4;
  }
  .bl-codec.unsupported {
    background: rgba(239,68,68,0.2); color: var(--danger);
    text-decoration: line-through;
  }
  .bl-codec.ok { color: var(--success); background: rgba(34,197,94,0.15); }
  /* 失败原因标签 */
  .bl-reason {
    font-size: 9px; padding: 1px 4px; border-radius: 3px;
    background: rgba(96,165,250,0.15); color: var(--info);
    flex-shrink: 0; line-height: 1.4; cursor: default;
  }
  /* 修复按钮 */
  .bl-repair {
    font-size: 12px; font-weight: 700; cursor: pointer; color: var(--success);
    padding: 0 3px; border-radius: 3px; flex-shrink: 0;
    transition: all 0.15s; line-height: 1;
    display: inline-flex; align-items: center; justify-content: center;
    width: 18px; height: 18px;
  }
  .bl-repair:hover { background: rgba(34,197,94,0.2); color: #4ade80; transform: scale(1.2); }
  .bottom-line-item.active .bl-repair { color: #fff; }
  .bottom-line-item.active .bl-repair:hover { background: rgba(255,255,255,0.2); color: #fff; }
  .ctrl-btn {
    display: flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 4px;
    border: 1px solid var(--border); background: var(--bg-card); color: var(--text-sub);
    font-size: 12px; cursor: pointer; transition: all 0.15s;
  }
  .ctrl-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
  .ctrl-btn.active { border-color: var(--warning); color: var(--warning); }
  #channel-count { font-size: 12px; color: var(--text-muted); }
  #settings-panel {
    position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
    display: none; align-items: center; justify-content: center;
  }
  #settings-panel.show { display: flex; }
  .settings-box {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 12px; width: 460px; padding: 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }
  .settings-box h2 { font-size: 16px; margin-bottom: 20px; color: var(--text-primary); display: flex; justify-content: space-between; align-items: center; }
  .settings-box h2 button { background: none; border: none; color: var(--text-muted); font-size: 18px; cursor: pointer; padding: 0; }
  .settings-box h2 button:hover { color: var(--text-primary); }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
  .form-group input, .form-group select {
    width: 100%; height: 36px; background: var(--bg-secondary); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text-primary); font-size: 13px; padding: 0 10px; outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus, .form-group select:focus { border-color: var(--accent); }
  .form-group select option { background: var(--bg-card); }
  .form-hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; line-height: 1.5; }
  .settings-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
  .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .toggle-row:last-child { border-bottom: none; }
  .toggle-row span { font-size: 13px; color: var(--text-sub); }
  .toggle { position: relative; width: 36px; height: 20px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider { position: absolute; inset: 0; border-radius: 20px; background: var(--border-light); cursor: pointer; transition: background 0.2s; }
  .toggle-slider::before { content:""; position:absolute; width:14px; height:14px; left:3px; top:3px; background:#fff; border-radius:50%; transition: transform 0.2s; }
  .toggle input:checked + .toggle-slider { background: var(--accent); }
  .toggle input:checked + .toggle-slider::before { transform: translateX(16px); }
  #dial-toast {
    position: fixed; bottom: 60px; right: 24px; z-index: 150;
    background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
    border: 1px solid var(--accent); border-radius: 10px;
    padding: 16px 24px; text-align: center;
    opacity: 0; transform: translateY(10px); transition: all 0.2s; pointer-events: none;
  }
  #dial-toast.show { opacity: 1; transform: translateY(0); }
  #dial-toast .dt-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
  #dial-toast .dt-number { font-size: 36px; font-weight: 700; color: var(--accent); letter-spacing: 6px; font-variant-numeric: tabular-nums; }
  #toast {
    position: fixed; top: 66px; left: 50%; transform: translateX(-50%) translateY(-10px);
    background: rgba(30,40,60,0.95); backdrop-filter: blur(8px);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 18px; font-size: 13px; color: var(--text-primary);
    opacity: 0; pointer-events: none; transition: all 0.25s; z-index: 300; white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.success { border-color: var(--success); color: var(--success); }
  #toast.error { border-color: var(--danger); color: var(--danger); }
  #toast.warn { border-color: var(--warning); color: var(--warning); }
  /* 频道线路状态指示区 */
  .ch-status { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; background: var(--border-light); transition: background 0.3s; margin-right: 2px; }
  .ch-status.ok { background: var(--success); box-shadow: 0 0 5px rgba(34,197,94,0.4); }
  .ch-status.err { background: var(--danger); }
  .ch-status.fail { background: var(--info); box-shadow: 0 0 5px rgba(96,165,250,0.4); }
  .ch-status.testing { background: var(--warning); animation: pulse-dot 0.6s ease-in-out infinite; }
  @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* 线路检测状态 */
  #detect-progress {
    position: fixed; top: 56px; left: 50%; transform: translateX(-50%); z-index: 200;
    background: rgba(17,24,39,0.95); border: 1px solid var(--border-light); border-radius: 8px;
    padding: 8px 16px; font-size: 12px; color: var(--text-sub); pointer-events: none;
    opacity: 0; transition: opacity 0.2s;
  }
  #detect-progress.show { opacity: 1; }

  /* 音量控制 */
  #vol-group { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
  #mute-btn {
    width: 28px; height: 28px; border-radius: 4px; border: 1px solid var(--border);
    background: var(--bg-card); color: var(--text-sub); font-size: 15px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: all 0.15s; line-height: 1;
  }
  #mute-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
  #mute-btn.muted { color: var(--danger); }
  #vol-slider {
    width: 66px; height: 4px; -webkit-appearance: none; appearance: none;
    background: var(--border); border-radius: 2px; outline: none; cursor: pointer;
  }
  #vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent); cursor: pointer; border: 2px solid var(--bg-card);
  }
  #vol-slider::-moz-range-thumb {
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent); cursor: pointer; border: 2px solid var(--bg-card);
  }

  /* 下载/录制按钮 */
  #download-btn {
    background: none; border: 1px solid var(--border); color: var(--text-muted);
    font-size: 12px; cursor: pointer; padding: 3px 10px; border-radius: 4px;
    transition: all 0.15s; white-space: nowrap; display: flex; align-items: center;
    gap: 5px; flex-shrink: 0;
  }
  #download-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
  #download-btn.recording {
    background: var(--danger); color: #fff; border-color: var(--danger);
    animation: pulse-dot 1s ease-in-out infinite;
  }
  #rec-dot { width: 7px; height: 7px; border-radius: 50%; background: #fff; display: none; flex-shrink: 0; }
  #download-btn.recording #rec-dot { display: inline-block !important; }
  .recording-indicator {
    position: absolute; top: 12px; right: 60px; z-index: 30; pointer-events: none;
    display: none; align-items: center; gap: 6px;
    background: rgba(239,68,68,0.9); color: #fff; font-size: 12px;
    padding: 4px 10px; border-radius: 4px; font-weight: 600;
  }
  .recording-indicator.show { display: flex; }
  .rec-dot-anim {
    width: 8px; height: 8px; border-radius: 50%; background: #fff;
    animation: pulse-dot 0.8s ease-in-out infinite;
  }
  #rec-timer { font-variant-numeric: tabular-nums; }
  #dl-progress { font-size: 10px; opacity: 0.85; margin-left: 2px; }

  /* ========== 响应式布局 ========== */

  /* 平板 & 小屏 (<1024px) */
  @media (max-width: 1024px) {
    :root { --sidebar-w: 220px; }
    #topbar { height: 44px; padding: 0 10px; gap: 8px; }
    #main { top: 44px; }
    #url-input { font-size: 12px; height: 30px; padding: 0 8px; }
    .btn { height: 30px; padding: 0 10px; font-size: 12px; }
    #info-bar { height: 46px; padding: 0 12px; gap: 10px; }
    #info-ch-name { font-size: 14px; min-width: 100px; }
    #player-bottom-bar { height: 36px; padding: 0 10px; gap: 8px; font-size: 11px; }
    #bottom-controls { gap: 4px; }
    .settings-box { width: 90vw; max-width: 420px; padding: 20px; }
    #sidebar-toggle-bar { width: 22px; }
    #sidebar-toggle-arrow { font-size: 14px; }
    #vol-slider { width: 50px; }
    #mute-btn { width: 26px; height: 26px; font-size: 13px; }
  }

  /* 手机竖屏 (<768px) 与 平板竖屏模式 */
  @media (max-width: 768px) {
    :root { --sidebar-w: 280px; }
    html, body { -webkit-overflow-scrolling: touch; }

    #topbar {
      height: 42px; padding: 0 8px; gap: 6px;
      background: rgba(6, 11, 22, 0.98);
    }
    #main { top: 42px; }
    #url-input { font-size: 16px; height: 34px; }
    .btn { height: 34px; padding: 0 10px; font-size: 14px; min-width: 44px; }

    </div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.20/dist/hls.min.js"></script>
<script>

/* ================================================================
   锟揭的碉拷共 MyTV - IPTV重试共 JS重试
   ================================================================ */
var state = {
  groups: [], allChannels: [],
  curGroupIdx: 0, curChanIdx: -1, curLineIdx: 0,
  favorites: new Set(),
  digitBuf: "", digitTimer: null, overlayTimer: null,
  hls: null, loadingTimer: null, playTimeout: null, videoCheckTimer: null, hevcWarned: null,
  cfg: { url: "", proxy: "", fit: "contain", autoswitch: true, remember: true },
  channelStatus: {},  // { "group|name": { lines: [{ok, latency, testing, playFailed}, ...] } }
  detectingGroupIdx: undefined,  // 正在检测的分组索引, undefined=全部
  volume: 1, isMuted: false,
  // 下载双模式: HLS分片下载 / 直播录制
  dlActive: false,         // 下载进行中
  dlMode: "",              // 'hls' | 'direct'
  dlAborter: null,         // AbortController
  dlChunks: [],            // 下载数据块 (HLS: [{url,data}], direct: [Uint8Array])
  dlTotalSegments: 0,      // 总分段数 (HLS)
  dlDownloadedSegments: 0, // 已下载分段数 (HLS)
  dlFailedSegments: 0,    // 下载失败的分段数 (HLS)
  dlDownloadedSize: 0,     // 已下载字节数 (direct)
  dlStartTime: null,       // 开始时间
  dlTimerId: null,         // 计时器ID
  dlPollTimerId: null,     // 直播轮询定时器ID
  dlSeenUrls: null,        // 已见分段URL去重
  dlM3u8Url: "",           // 当前m3u8 URL
  dlProxyBase: "",         // 下载代理基础URL (如 http://127.0.0.1:8799/?url=)
  dlContentType: "",       // 响应 Content-Type (direct模式)
  // Canvas+AudioContext 录制 (record模式, 非HLS)
  dlMediaRecorder: null,  // MediaRecorder 实例
  dlRecCanvas: null,      // 隐藏 Canvas 元素
  dlRecCanvasCtx: null,   // Canvas 2D 上下文
  dlAudioCtx: null,       // AudioContext
  dlAudioSrc: null,       // MediaElementAudioSourceNode
  dlAudioDest: null,      // MediaStreamAudioDestinationNode
  dlVidCallbackId: null,  // requestVideoFrameCallback ID
  dlRecordedBlob: null,   // 录制完成后的 Blob
  dlRecordInterval: null, // Canvas 绘制间隔 timer
  lastErrorInfo: null,    // { type, detail, timestamp } 最后一次错误信息
  repairStrategy: null    // 修复策略: 'relaxed'|'native'|'retry'|null
};
var $ = function(id) { return document.getElementById(id); };
var videoEl = $("video-el");

/* ---------- 配置持久化 ---------- */
function loadConfig() {
  try { var s = localStorage.getItem("mytv_config"); if (s) Object.assign(state.cfg, JSON.parse(s)); } catch(e) {}
  $("cfg-url").value = state.cfg.url; $("cfg-proxy").value = state.cfg.proxy;
  $("cfg-fit").value = state.cfg.fit; $("cfg-autoswitch").checked = state.cfg.autoswitch;
  $("cfg-remember").checked = state.cfg.remember;
  if (state.cfg.url) $("url-input").value = state.cfg.url;
  videoEl.style.objectFit = state.cfg.fit;
}
function saveSettings() {
  state.cfg.url = $("cfg-url").value.trim(); state.cfg.proxy = $("cfg-proxy").value.trim();
  state.cfg.fit = $("cfg-fit").value; state.cfg.autoswitch = $("cfg-autoswitch").checked;
  state.cfg.remember = $("cfg-remember").checked;
  localStorage.setItem("mytv_config", JSON.stringify(state.cfg));
  if (state.cfg.url) $("url-input").value = state.cfg.url;
  videoEl.style.objectFit = state.cfg.fit;
  closeSettings(); showToast("设置已保存", "success");
}
function openSettings() {
  $("cfg-url").value = state.cfg.url; $("cfg-proxy").value = state.cfg.proxy;
  $("cfg-fit").value = state.cfg.fit; $("cfg-autoswitch").checked = state.cfg.autoswitch;
  $("cfg-remember").checked = state.cfg.remember;
  $("settings-panel").classList.add("show");
}
function closeSettings() { $("settings-panel").classList.remove("show"); }

/* ---------- 收藏 ---------- */
function loadFavorites() {
  try { var f = localStorage.getItem("mytv_favorites"); if (f) state.favorites = new Set(JSON.parse(f)); } catch(e) {}
}
function saveFavorites() { localStorage.setItem("mytv_favorites", JSON.stringify([].slice.call(state.favorites))); }

/* ---------- M3U / TVbox / TXT 解析 ---------- */
function parseIPTV(text) {
  text = text.trim();
  // 锟狡筹拷 BOM 头
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
  // 全锟角讹拷第统一转检测
  text = text.replace(/\uff0c/g, ",");
  // 检测 M3U 第式
  if (text.includes("#EXTM3U") || text.includes("#EXTINF")) return parseM3UFormat(text);
  // 检测 TXT/TVbox 第式第#genre# 重试共 共 第锟脚分革拷 共 锟杰碉拷第锟街革拷第
  if (text.includes("#genre#") || isTxtFormat(text)) return parseTxtFormat(text);
  // 第锟阶ｏ拷锟饺筹拷第TXT锟劫筹拷第M3U
  var r = parseTxtFormat(text);
  return r.length ? r : parseM3UFormat(text);
}

/* 锟叫讹拷锟角凤拷为 TXT 第式个频道第,URL 共 频重试|URL 模式共 */
function isTxtFormat(text) {
  var lines = text.split("\n"), commaCount = 0, pipeCount = 0, total = 0;
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i].trim();
    if (!line || line.startsWith("#")) continue;
    total++;
    if (line.indexOf(",") > 0 && !line.match(/^https?:\/\//)) commaCount++;
    if (line.indexOf("|") > 0 && !line.match(/^https?:\/\//)) pipeCount++;
  }
  // 如果30%以上行含逗号或管道符，判定为 TXT格式
  return total > 0 && ((commaCount + pipeCount) / total > 0.3);
}

/* M3U 第准第式第共 */
function parseM3UFormat(text) {
  var lines = text.split("\n"), groupMap = {}, curInfo = null;
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i].trim(); if (!line) continue;
    if (line.startsWith("#EXTINF")) {
      var gm = line.match(/group-title\s*=\s*"([^"]*)"/i);
      var tm = line.match(/tvg-name\s*=\s*"([^"]*)"/i);
      var nm = line.match(/,\s*(.+?)\s*$/);
      curInfo = { group: (gm ? gm[1].trim() : "未重试") || "未重试", name: (tm ? tm[1].trim() : (nm ? nm[1].trim() : "未知频第")) || "未知频第" };
    } else if (!line.startsWith("#") && isStreamUrl(line)) {
      if (curInfo) {
        if (!groupMap[curInfo.group]) groupMap[curInfo.group] = {};
        if (!groupMap[curInfo.group][curInfo.name]) groupMap[curInfo.group][curInfo.name] = [];
        groupMap[curInfo.group][curInfo.name].push(line);
        curInfo = null;
      }
    }
  }
  return buildGroups(groupMap);
}

/* TXT/TVbox 第式重试个频道第,URL 共 频重试|URL共 */
function parseTxtFormat(text) {
  var lines = text.split("\n"), groupMap = {}, curGroup = "未重试";
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i].trim();
    if (!line) continue;
    // 播放中注重试
    if (line.startsWith("#") && !line.includes("#genre#") && !line.startsWith("#EXTINF")) continue;

    // #genre# 播放中
    if (line.endsWith(",#genre#") || line === "#genre#") {
      curGroup = line.replace(",#genre#", "").replace("#genre#", "").trim() || "未重试";
      continue;
    }

    // 播放中第锟叫ｏ拷锟睫讹拷锟脚★拷第URL重试注锟酵★拷第#genre#第
    // 锟叫讹拷播放中锟睫讹拷锟脚★拷锟睫管碉拷播放中重试URL重试一第个频道第
    if (line.indexOf(",") === -1 && line.indexOf("|") === -1 && !isStreamUrl(line) && !line.startsWith("#")) {
      if (i + 1 < lines.length) {
        var nextLine = lines[i + 1].trim();
        if (nextLine && (nextLine.indexOf(",") > 0 || nextLine.indexOf("|") > 0)) {
          curGroup = line;
          continue;
        }
      }
      continue;
    }

    // 频道名:URL 支持管道符分隔
    var sep = line.indexOf(",") > 0 ? "," : (line.indexOf("|") > 0 ? "|" : null);
    if (!sep) continue;
    var ci = line.indexOf(sep);
    var name = line.substring(0, ci).trim();
    var urlPart = line.substring(ci + 1).trim();
    if (!name || !urlPart) continue;

    // 播放中锟铰凤拷检测 # 锟街革拷第
    var rawUrls = urlPart.split("#");
    var urls = [];
    for (var u = 0; u < rawUrls.length; u++) {
      var raw = rawUrls[u].trim();
      if (isStreamUrl(raw)) urls.push(raw);
    }
    if (!urls.length) continue;

    if (!groupMap[curGroup]) groupMap[curGroup] = {};
    if (!groupMap[curGroup][name]) groupMap[curGroup][name] = [];
    for (var ui = 0; ui < urls.length; ui++) {
      groupMap[curGroup][name].push(urls[ui]);
    }
  }
  return buildGroups(groupMap);
}

/* 锟叫讹拷锟角凤拷重试媒第URL */
function isStreamUrl(s) {
  return /^(https?|rtsp|rtp|rtmp|p2p|mitv|tvbus|qsp|flv|mms|mmsh)\s*:\/\//i.test(s) ||
         s.startsWith("http") || s.startsWith("rtsp") || s.startsWith("rtp");
}

function buildGroups(groupMap) {
  var groups = [], gIdx = 0;
  for (var gn in groupMap) {
    if (!groupMap.hasOwnProperty(gn)) continue;
    var chans = [], chanMap = groupMap[gn];
    for (var cn in chanMap) {
      if (!chanMap.hasOwnProperty(cn)) continue;
      gIdx++;
      chans.push({ name: cn, urls: chanMap[cn], index: gIdx, group: gn });
    }
    if (chans.length) groups.push({ name: gn, channels: chans });
  }
  // 播放中播放中确第"第个频道"第前
  groups.sort(function(a, b) {
    if (a.name === "第个频道") return -1;
    if (b.name === "第个频道") return 1;
    if (a.name === "第个频道") return -1;
    if (b.name === "第个频道") return 1;
    return a.name.localeCompare(b.name, "zh-CN");
  });
  return groups;
}

/* ---------- 直播源加载 ---------- */
function loadFromUrl() {
  var url = $("url-input").value.trim();
  if (!url) { showToast("播放中直播源 URL", "warn"); return; }
  showLoading(true, "第锟节硷拷第检测...");
  tryFetch(url);
}

/* 统一第锟截ｏ拷锟饺硷拷獗撅拷卮检测 共 重试模式 共 直播第共 */
function tryFetch(url) {
  // 锟饺硷拷锟経RL锟角凤拷播放中直播个频道
  if (/\.(m3u8|ts|mp4|flv)(\?|$|#)/i.test(url)) {
    processStreamUrl(url);
    return;
  }

  // 文件URL可能包含单个视频
  checkProxy().then(function(proxyBase) {
    if (proxyBase) {
      // 第式1: 通重试锟截达拷第
      showLoading(true, "第锟截达拷播放中第...");
      var fetchUrl = proxyBase + encodeURIComponent(url);
      return fetch(fetchUrl, { cache: "no-cache", signal: AbortSignal.timeout(25000) })
        .then(function(r) {
          if (!r.ok) throw new Error("播放中共 HTTP " + r.status);
          return r.text();
        })
        .then(function(text) {
          processM3U(text, url);
        })
        .catch(function(proxyErr) {
          // 重试失共 共 第锟剿碉拷直播
          showLoading(true, "播放中第锟矫ｏ拷重试直播...");
          return fetchDirect(url);
        });
    } else {
      // 第式2: 锟睫达拷重试直播重试
      showLoading(true, "直播播放中...");
      return fetchDirect(url);
    }
  }).catch(function(finalErr) {
    showLoading(false);
    var msg = (finalErr && finalErr.message) || "";
    if (msg.indexOf("Failed to fetch") >= 0 || msg.indexOf("NetworkError") >= 0) {
      showToast("加载失败，请确认: 1)URL可访问 2)已双击start.bat启动代理", "error");
    } else if (msg.indexOf("HTTP 502") >= 0) {
      showToast("服务器返回502，可能超时，请稍后重试或更换URL", "error");
    } else {
      showToast("加载失败: " + msg + "，也可以直接打开本地文件", "error");
    }
  });
}

/* 第獗撅拷卮播放中第锟剿口筹拷锟皆ｏ拷 */
function checkProxy() {
  var ports = [8799, 8800, 8801, 8802];
  function tryPort(idx) {
    if (idx >= ports.length) return Promise.resolve(null);
    var healthUrl = "http://127.0.0.1:" + ports[idx] + "/health";
    return fetch(healthUrl, { mode: "cors", cache: "no-cache", signal: AbortSignal.timeout(2000) })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        return (d && d.status === "ok") ? ("http://127.0.0.1:" + ports[idx] + "/?url=") : tryPort(idx + 1);
      })
      .catch(function() { return tryPort(idx + 1); });
  }
  return tryPort(0);
}

/* 直播第共 */
function fetchDirect(url) {
  return fetch(url, { cache: "no-cache", signal: AbortSignal.timeout(20000) })
    .then(function(r) {
      if (!r.ok) throw new Error("直播 HTTP " + r.status);
      return r.text();
    })
    .then(function(text) {
      processM3U(text, url);
    })
    .catch(function(err) {
      var msg = (err && err.message) || "";
      if (msg.indexOf("Failed to fetch") >= 0 || msg.indexOf("NetworkError") >= 0) {
        throw new Error("直播播放中第检测(CORS)重试双第start.bat播放中锟截达拷第");
      }
      throw err;
    });
}
function loadFromFile(ev) {
  var file = ev.target.files[0]; if (!file) return;
  showLoading(true, "第锟节讹拷取 " + file.name + "...");
  var reader = new FileReader();
  reader.onload = function(e) { processM3U(e.target.result, file.name); ev.target.value = ""; };
  reader.onerror = function() { showLoading(false); showToast("锟侥硷拷第取失第", "error"); };
  reader.readAsText(file, "UTF-8");
}

/* 直播个频道第址第共 (m3u8/ts/mp4/flv第) */
function processStreamUrl(url) {
  var name = url.split("/").pop().split("?")[0] || "直播第";
  var nm = url.match(/[?&]name=([^&]+)/i);
  if (nm) name = decodeURIComponent(nm[1]);
  state.groups = [{ name: "直锟接诧拷第", channels: [{ name: name, urls: [url], index: 1, group: "直锟接诧拷第" }] }];
  state.allChannels = state.groups[0].channels;
  state.curGroupIdx = 0; state.curChanIdx = 0; state.curLineIdx = 0;
  try { localStorage.setItem("mytv_lasturl", url); } catch(e) {}
  showLoading(false); renderSidebar();
  playChannelByGlobalIdx(0);
  showToast("直连: " + name, "success");
}

function processM3U(text, sourceName) {
  // 重试欠锟轿狧LS媒第锟藉单第个频道锟叫憋拷第
  if (text.indexOf("#EXT-X-STREAM-INF") >= 0 || text.indexOf("#EXT-X-TARGETDURATION") >= 0) {
    showLoading(false);
    var url = $("url-input").value.trim() || sourceName;
    if (url && /^https?:\/\//.test(url)) {
      processStreamUrl(url);
    } else {
      showToast("第獾紿LS第媒第锟藉单第锟诫将第URL直播粘播放中播放中", "warn");
    }
    return;
  }
  var groups = parseIPTV(text);
  if (!groups.length) { showLoading(false); showToast("未播放中锟轿猴拷频重试支锟街革拷式: M3U(#EXTINF)第TXT(频重试,URL)第TVbox(#genre#)重试锟経RL播放中直播个频道 / 第要播放中第", "error"); return; }
  state.groups = groups;
  state.allChannels = groups.reduce(function(a, g) { return a.concat(g.channels); }, []);
  state.curGroupIdx = 0; state.curChanIdx = -1; state.curLineIdx = 0;
  try { localStorage.setItem("mytv_lasturl", $("url-input").value || sourceName); } catch(e) {}
  showLoading(false); renderSidebar();
  var rawUrl = $("url-input").value.trim();
  if (rawUrl) { state.cfg.url = rawUrl; localStorage.setItem("mytv_config", JSON.stringify(state.cfg)); }
  showToast("加载成功: " + groups.length + "  个分组, 共 " + state.allChannels.length + " 个频道", "success");
  if (state.cfg.remember) restoreLastChannel();
}

/* ---------- 侧边栏渲染 ---------- */
function renderSidebar() { renderGroupNav(); renderChannelList(); $("channel-count").textContent = "共 " + state.allChannels.length + " 个频道"; }
function renderGroupNav() {

}
function selectGroup(idx) { state.curGroupIdx = idx; renderGroupNav(); renderChannelList(); }
function getCurChans() {
  if (state.curGroupIdx === -1) return state.allChannels.filter(function(c) { return state.favorites.has(c.name); });

}
function renderChannelList() {

      '<span class="ch-status' + sumCls + '" title="' + (sumCls === " ok" ? "锟叫匡拷条线路" : sumCls === " err" ? "全第失第" : sumCls === " testing" ? "第检测" : "未检测") + '"></span>' +
      '<span class="ch-index">' + ch.index + '</span>' +
      '<span class="ch-name">' + escHtml(ch.name) + '</span>' +
      '<span class="ch-fav' + (isFav ? " is-fav" : "") + '" onclick="event.stopPropagation();toggleFavoriteByName(\'' + escAttr(ch.name) + '\')">' + (isFav ? "*" : "+") + '</span>' +
      '</div>';
  });

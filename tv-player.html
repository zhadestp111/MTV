/* 频播放中状态重试一线路锟缴诧拷第共 / 条线路第锟接成癸拷第全重试失锟杰★拷共 / 全失锟杰★拷共 / 重试小检测 / 未重试共 */
function getChSummaryCls(st) {
  if (!st || !st.lines || !st.lines.length) return "";
  var anyOk = false, allDone = true, anyTesting = false, anyFailed = false, anyReachable = false, anyPlayFailed = false;
  for (var i = 0; i < st.lines.length; i++) {
    var s = st.lines[i];
    if (s.ok === true && !s.playFailed) anyOk = true;
    if (s.ok === true) anyReachable = true;
    if (s.ok === true && s.playFailed) anyPlayFailed = true;
    if (s.ok === false) anyFailed = true;
    if (s.testing) anyTesting = true;
    if (!s.hasOwnProperty("ok") && !s.testing) allDone = false;
  }
  if (anyTesting) return " testing";
  if (anyOk) return " ok";
  // 没有可用线路则标记为失败状态
  if (anyPlayFailed && allDone) return " fail";
  if (anyFailed && !anyReachable && allDone) return " err";
  return "";
}

/* 锟阶诧拷线路播放中第染 */
function renderBottomLines() {
  var container = $("bottom-lines");
  if (state.curChanIdx < 0 || !state.allChannels.length) { container.innerHTML = ""; return; }
  var ch = state.allChannels[state.curChanIdx];
  if (!ch || ch.urls.length <= 1) { container.innerHTML = ""; return; }
  var sKey = ch.group + "|" + ch.name, st = state.channelStatus[sKey];
  var html = "";
  for (var i = 0; i < ch.urls.length; i++) {
    var ls = (st && st.lines && st.lines[i]) || {};
    var isCur = i === state.curLineIdx;
    var speedText, speedCls;
    if (ls.playFailed)     { speedText = ls.latency ? ls.latency + "ms" : "--"; speedCls = "fail"; }
    else if (ls.ok === true)   { speedText = ls.latency + "ms"; speedCls = "ok"; }
    else if (ls.ok === false)  { speedText = "X"; speedCls = "err"; }
    else if (ls.testing)       { speedText = "..."; speedCls = "testing"; }
    else                       { speedText = "?"; speedCls = "unknown"; }
    // 重试按钮
    var codecHtml = "";
    if (ls.codec) {
      var cl = getCodecLabel(ls.codec);
      var unsup = ls.codecUnsupported;
      codecHtml = '<span class="bl-codec' + (unsup ? ' unsupported' : '') + '" title="' + escAttr(ls.codec + (unsup ? ' (当前浏览器不支持)' : '')) + '">' + escHtml(cl) + '</span>';
    }
    // 失败原因标签 + 修复按钮
    var failInfo = "";
    var chIdx = state.curChanIdx;
    if (ls.playFailed && ls.failReason) {
      var reasonLabel = getRepairLabel(ls.failReason);
      var rc = ls.repairCount || 0;
      failInfo = '<span class="bl-reason" title="' + escAttr("失第原第: " + reasonLabel + (ls.failDetail ? " (" + ls.failDetail + ")" : "") + " | 锟窖筹拷第锟睫革拷" + rc + "第") + '">' + escHtml(reasonLabel) + '</span>';
      if (rc < 3) {
        failInfo += '<span class="bl-repair" onclick="event.stopPropagation();manualRepairLine(' + chIdx + ',' + i + ')" title="重试修复中第锟铰诧拷第">?</span>';
      }
    }
    html += '<div class="bottom-line-item' + (isCur ? " active" : "") + '" onclick="playLineByGlobalIdx(' + state.curChanIdx + ',' + i + ')">' +
      '<span class="bl-num">' + (i + 1) + '</span>' +
      '<span class="bl-speed ' + speedCls + '">' + speedText + '</span>' +
      codecHtml +
      failInfo +
      '</div>';
  }
  container.innerHTML = html;
}

/* ---------- 频道线路检测 ---------- */
var detectAborted = false;
var detectRunning = false;

/* 全部频道检测（检测按钮触发） */
function testAllChannels() {
  if (detectRunning) {
    detectAborted = true; showToast("已停止检测...", "warn"); return;
  }
  if (!state.allChannels.length) { showToast("第锟饺硷拷第直播源", "warn"); return; }
  startDetection(state.allChannels, "全个频道", undefined);
}

/* 分组检测（分组标签 ? 按钮触发 */
function testGroupChannels(groupIdx) {
  if (detectRunning) { showToast("请先停止当前检测任务", "warn"); return; }
  if (groupIdx < 0 || groupIdx >= state.groups.length) return;
  var chans = state.groups[groupIdx].channels;
  if (!chans.length) { showToast("锟矫凤拷第个频道", "warn"); return; }
  startDetection(chans, state.groups[groupIdx].name, groupIdx);
}

/* 通锟矫硷拷第检测 */
function startDetection(channels, label, groupIdx) {
  detectAborted = false; detectRunning = true;
  state.detectingGroupIdx = groupIdx;
  $("detect-btn").textContent = "停止";
  $("detect-btn").style.color = "var(--danger)";
  renderGroupNav();

  var totalLines = 0;
  channels.forEach(function(ch) { totalLines += ch.urls.length; });
  var testedLines = 0;
  showDetectProgress(0, totalLines, label);

  var ci = 0;
  function testNextChan() {
    if (detectAborted || ci >= channels.length) { finishDetection(totalLines, label); return; }
    var ch = channels[ci]; ci++;
    var sKey = ch.group + "|" + ch.name;
    if (!state.channelStatus[sKey]) state.channelStatus[sKey] = { lines: [] };
    var arr = state.channelStatus[sKey].lines;
    while (arr.length < ch.urls.length) arr.push({});
    for (var li = 0; li < ch.urls.length; li++) arr[li].testing = true;
    renderChannelList();

    var liIdx = 0;
    function testNextLine() {
      if (detectAborted || liIdx >= ch.urls.length) {
        renderChannelList(); renderBottomLines();
        setTimeout(testNextChan, 60);
        return;
      }
      var url = ch.urls[liIdx];
      var curLi = liIdx; liIdx++;
      // 第检测 playFailed 状态
      var oldPf = arr[curLi].playFailed;
      testSingleUrl(url, function(result) {
        if (oldPf) result.playFailed = true;
        arr[curLi] = result;
        testedLines++;
        showDetectProgress(testedLines, totalLines, label);
        renderChannelList(); renderBottomLines();
        setTimeout(testNextLine, result.ok ? 40 : 20);
      });
    }
    testNextLine();
  }
  testNextChan();
}

function testSingleUrl(url, callback) {
  if (!url) { callback({ ok: false, latency: -1 }); return; }
  var start = Date.now();
  var controller = new AbortController();
  var timer = setTimeout(function() { controller.abort(); }, 5000);

  fetch(url, { method: "HEAD", mode: "no-cors", cache: "no-cache", signal: controller.signal })
    .then(function() {
      clearTimeout(timer);
      callback({ ok: true, latency: Date.now() - start });
    })
    .catch(function() {
      clearTimeout(timer);
      var c2 = new AbortController();
      var t2 = setTimeout(function() { c2.abort(); }, 6000);
      fetch(url, { method: "GET", mode: "no-cors", cache: "no-cache", signal: c2.signal })
        .then(function() {
          clearTimeout(t2);
          callback({ ok: true, latency: Date.now() - start });
        })
        .catch(function() {
          clearTimeout(t2);
          callback({ ok: false, latency: Date.now() - start });
        });
    });
}

function showDetectProgress(cur, total, label) {
  var el = $("detect-progress");
  el.textContent = "检测中... " + cur + "/" + total + " 条线路" + (label ? " (" + label + ")" : "");
  el.classList.add("show");
}

function finishDetection(totalLines, label) {
  detectRunning = false;
  state.detectingGroupIdx = undefined;
  $("detect-btn").textContent = "检测";
  $("detect-btn").style.color = "";
  $("detect-progress").classList.remove("show");
  renderGroupNav();
  var ok = 0, fail = 0;
  for (var k in state.channelStatus) {
    var ls = state.channelStatus[k].lines;
    if (!ls) continue;
    for (var i = 0; i < ls.length; i++) {
      if (ls[i].ok === true) ok++;
      else if (ls[i].ok === false) fail++;
    }
  }
  showToast((label || "检测") + "检测: " + ok + " 条可达, " + fail + " 第失第, 共 " + (totalLines || (ok + fail)) + " 条线路", fail ? "warn" : "success");
  detectAborted = false;
}
function playChannelByGlobalIdx(gi) {
  if (gi < 0 || gi >= state.allChannels.length) return;
  state.curChanIdx = gi; state.curLineIdx = 0;
  var ch = state.allChannels[gi];
  playLine(ch, 0); renderChannelList(); renderBottomLines(); updateInfoBar();
  if (state.cfg.remember) try { localStorage.setItem("mytv_lastch", gi); } catch(e) {}
}
/* 直锟接诧拷第指个频道指条线路 */
function playLineByGlobalIdx(gi, li) {
  if (gi < 0 || gi >= state.allChannels.length) return;
  var ch = state.allChannels[gi];
  if (li < 0 || li >= ch.urls.length) return;
  state.curChanIdx = gi; state.curLineIdx = li;
  // 锟矫伙拷锟街讹拷选共 共 重试薷重试
  var sKey = ch.group + "|" + ch.name;
  if (state.channelStatus[sKey] && state.channelStatus[sKey].lines && state.channelStatus[sKey].lines[li]) {
    state.channelStatus[sKey].lines[li].repairCount = 0;
  }
  playLine(ch, li); renderChannelList(); renderBottomLines(); updateInfoBar();
  if (state.cfg.remember) try { localStorage.setItem("mytv_lastch", gi); } catch(e) {}
}
function playLine(ch, li) {
  var url = ch.urls[li] || ch.urls[0]; state.curLineIdx = li;
  // 切换线路时清除 playFailed 和 repair 状态
  var sKey = ch.group + "|" + ch.name;
  if (state.channelStatus[sKey] && state.channelStatus[sKey].lines && state.channelStatus[sKey].lines[li]) {
    state.channelStatus[sKey].lines[li].playFailed = false;
  }
  // 第取修复中第
  var repairStrat = state.repairStrategy;
  state.repairStrategy = null;

  $("empty-state").style.display = "none";
  showLoading(true, (repairStrat ? "修复中" : "正在播放") + " " + ch.name + "...");
  setStatusTag(repairStrat ? "修复中" : "播放中", "");
  destroyHls();
  clearTimeout(state.playTimeout);

  // 锟叫讹拷锟角凤拷共 hls.js播放中第直播锟侥硷拷第式第共 hls.js
  var isDirectFile = /\.(mp4|webm|ogg|flv|ts|avi|mov|mkv|wmv)(\?|$|#)/i.test(url);
  var useHls = window.Hls && Hls.isSupported() && !isDirectFile;

  // 修复中锟皆革拷第
  if (repairStrat === "native") {
    useHls = false; // 强第原重试锟脚ｏ拷重试hls.js第
  }

  if (useHls) {
    // crossOrigin 必须设置在 hls.attachMedia 之前
    videoEl.crossOrigin = "anonymous";
    // HLS 配置
    var hlsCfg = {
      enableWorker: false,
      manifestLoadingMaxRetry: 2, manifestLoadingRetryDelay: 1000,
      levelLoadingMaxRetry: 2, levelLoadingRetryDelay: 1000
    };
    if (repairStrat === "relaxed") {
      // 重试模式第锟接大缓筹拷重试锟截闭碉拷锟接迟★拷播放中第
      hlsCfg = {
        enableWorker: false,
        lowLatencyMode: false,
        maxBufferLength: 60,
        maxMaxBufferLength: 600,
        backBufferLength: 90,
        manifestLoadingMaxRetry: 5, manifestLoadingRetryDelay: 2000,
        levelLoadingMaxRetry: 5, levelLoadingRetryDelay: 2000,
        fragLoadingMaxRetry: 3
      };
    } else {
      // 默第模式
      hlsCfg.lowLatencyMode = true;
      hlsCfg.backBufferLength = 30;
    }
    var hls = new Hls(hlsCfg);
    state.hls = hls;
    hls.loadSource(url); hls.attachMedia(videoEl);
    hls.on(Hls.Events.MANIFEST_PARSED, function(ev, data) {
      // 第取播放中息
      var codec = "";
      if (data.levels && data.levels.length) {
        data.levels.forEach(function(lv) {
          var c = (lv.attrs && lv.attrs.CODECS) || (lv.codecs) || "";
          if (c && !codec) codec = c;
        });
        // 如果不是HEVC
        var allHevc = true;
        data.levels.forEach(function(lv) {
          var c = (lv.attrs && lv.attrs.CODECS) || (lv.codecs) || "";
          if (!/hvc|hev|HEVC|H265|h265/i.test(c)) allHevc = false;
        });
        if (allHevc) {
          console.warn("[MyTV] All variants use HEVC, browser may not decode video");
          state.hevcWarned = ch.name;
        }
      }
      if (codec) saveLineCodec(ch, codec);
      startPlaybackWatchdog(ch);
      videoEl.play().catch(function() {});
    });
    hls.on(Hls.Events.ERROR, function(ev, data) {
      if (!data.fatal) {
        // 播放中第锟襟：伙拷第停第/第锟界抖共 共 第锟皆恢革拷
        var isNetworkErr = data.type === Hls.ErrorTypes.NETWORK_ERROR;
        var isBufferStall = data.details === "bufferStalledError";
        if (isNetworkErr || isBufferStall) {
          console.warn("[MyTV] HLS recoverable:", data.details, "共 retrying");
          setTimeout(function() {
            if (state.hls === hls && state.curChanIdx >= 0) hls.recoverMediaError();
          }, isBufferStall ? 500 : 1000);
        }
        return;
      }
      // 播放正常，清除错误状态
      console.error("[MyTV] HLS fatal:", data.type, data.details);
      var reason = data.type === Hls.ErrorTypes.NETWORK_ERROR ? "network" : "hls_error";
      handlePlayError(ch, reason, data.type + "/" + (data.details || "unknown"));
    });
    hls.on(Hls.Events.LEVEL_LOADED, function() {
      // 片锟轿匡拷始第锟截ｏ拷锟接筹拷第锟脚癸拷播放中锟姐够时锟戒）
      resetPlaybackWatchdog(ch);
    });
  } else {
    // 原生 video 播放（非HLS文件/修复模式=原生）
    videoEl.crossOrigin = "anonymous";
    videoEl.src = url;
    videoEl.load();
    // 修复中第模式第锟接筹拷第锟脚癸拷
    if (repairStrat === "retry" || repairStrat === "native") {
      state.playTimeout = setTimeout(function() {
        if (state.curChanIdx >= 0 && (!videoEl.playing || !videoEl.currentTime)) {
          console.warn("[MyTV] Native/retry watchdog timeout for", ch.name);
          handlePlayError(ch, "timeout", "native retry failed");
        }
      }, 20000); // 修复模式更宽容的超时时间
    } else {
      startPlaybackWatchdog(ch);
    }
    videoEl.play().catch(function(e) {
      // play() 第锟杰撅拷通重试锟皆讹拷第锟脚诧拷锟皆ｏ拷重试媒第检测
      // 重试没第呀播放中播放中第默重试
      if (e.name === "NotAllowedError") {
        console.warn("[MyTV] Autoplay blocked by browser policy");
      } else {
        handlePlayError(ch, "media_error", e.name + ": " + (e.message || ""));
      }
    });
  }
  updateOverlay(ch);
}

/* 播放超时第锟脚癸拷第12重试未第始第共 共 锟皆讹拷条线路 */
function startPlaybackWatchdog(ch) {
  clearTimeout(state.playTimeout);
  state.playTimeout = setTimeout(function() {
    if (state.curChanIdx >= 0 && !videoEl.playing && !videoEl.currentTime) {
      console.warn("[MyTV] Playback watchdog timeout for", ch.name);
      handlePlayError(ch, "timeout", "12s no playback");
    }
  }, 12000);
}
function resetPlaybackWatchdog(ch) {
  clearTimeout(state.playTimeout);
  state.playTimeout = setTimeout(function() {
    if (state.curChanIdx >= 0 && !videoEl.playing) {
      console.warn("[MyTV] Playback watchdog timeout (reset) for", ch.name);
      handlePlayError(ch, "timeout", "extended timeout");
    }
  }, 18000);
}

/* 个频道锟诫不第锟捷达拷播放中重试锟睫伙拷共 */
function handleCodecError(ch) {
  clearTimeout(state.playTimeout);
  clearTimeout(state.videoCheckTimer);
  diagnosePlayFailure(ch, "codec", "HEVC/H.265 video-only, no picture");
  markLinePlayFailed(ch);
  showLoading(false);

  // 锟饺筹拷第修复中原重试锟脚匡拷第支第HEVC重试Safari第
  var sKey = ch.group + "|" + ch.name, ls = (state.channelStatus[sKey] && state.channelStatus[sKey].lines) || [];
  var curLs = ls[state.curLineIdx] || {};
  if (!curLs.repairCount || curLs.repairCount === 0) {
    if (tryRepairLine(ch, state.curLineIdx)) return;
  }

  if (state.cfg.autoswitch && state.curLineIdx < ch.urls.length - 1) {
    var nl = state.curLineIdx + 1;
    showToast("线路" + (state.curLineIdx + 1) + " 个频道锟诫不重试(重试HEVC)第锟叫伙拷线路" + (nl + 1), "warn");
    setTimeout(function() { playLine(ch, nl); }, 500);
  } else {
    setStatusTag("编码不兼容", "err");
    showToast("频道 " + ch.name + " 视频编码不兼容(可能H.265/HEVC)，当前浏览器不支持此编码，请尝试切换线路", "error");
  }
}

/* 第堑锟角帮拷锟铰凤拷第锟绞э拷埽重试锟絆K第锟睫凤拷第锟脚★拷第色共 */
function markLinePlayFailed(ch) {
  var sKey = ch.group + "|" + ch.name;
  if (!state.channelStatus[sKey]) state.channelStatus[sKey] = { lines: [] };
  var arr = state.channelStatus[sKey].lines;
  while (arr.length <= state.curLineIdx) arr.push({});
  arr[state.curLineIdx].playFailed = true;
  renderBottomLines(); renderChannelList();
}

function handlePlayError(ch, reason, detail) {
  clearTimeout(state.playTimeout);
  // 播放成功时
  diagnosePlayFailure(ch, reason || "unknown", detail || "");
  // 第堑锟角帮拷锟铰凤拷第锟绞э拷埽重试锟絆K第锟睫凤拷第锟脚★拷第色第
  markLinePlayFailed(ch);

  // 锟饺筹拷第修复中前线路第锟阶达拷失第锟皆讹拷锟睫革拷一锟轿ｏ拷
  var sKey = ch.group + "|" + ch.name, ls = (state.channelStatus[sKey] && state.channelStatus[sKey].lines) || [];
  var curLs = ls[state.curLineIdx] || {};
  if (!curLs.repairCount || curLs.repairCount === 0) {
    if (tryRepairLine(ch, state.curLineIdx)) {
      return; // 锟睫革拷锟窖达拷播放中重试锟叫伙拷
    }
  }

  // 锟睫革拷失锟杰伙拷锟窖筹拷锟皆癸拷 共 锟叫伙拷线路
  if (state.cfg.autoswitch && state.curLineIdx < ch.urls.length - 1) {
    var nl = state.curLineIdx + 1;
    showToast("线路" + (state.curLineIdx + 1) + "失第, 锟叫伙拷线路" + (nl + 1), "warn");
    setTimeout(function() { playLine(ch, nl); }, 500);
  } else {
    showLoading(false); setStatusTag("全部失败", "err");
    showToast("频道 " + ch.name + " 所有线路均已失败，请尝试手动修复或切换频道", "error");
  }
}
/* 播放成功时清除 */
function diagnosePlayFailure(ch, reason, detail) {
  var sKey = ch.group + "|" + ch.name;
  if (!state.channelStatus[sKey]) state.channelStatus[sKey] = { lines: [] };
  var arr = state.channelStatus[sKey].lines;
  while (arr.length <= state.curLineIdx) arr.push({});
  arr[state.curLineIdx].failReason = reason;
  arr[state.curLineIdx].failDetail = detail || "";
  state.lastErrorInfo = { type: reason, detail: detail || "", timestamp: Date.now() };
  renderBottomLines();
}

/* 失败原因诊断标签 */
function getRepairLabel(reason) {
  switch(reason) {
    case "codec": return "编码不兼容";
    case "timeout": return "播放超时";
    case "network": return "重试检测";
    case "hls_error": return "HLS错误";
    case "media_error": return "媒第检测";
    default: return "未知原因";
  }
}

/* 修复策略：根据错误类型选择不同的修复方式 */
function tryRepairLine(ch, lineIdx) {
  var sKey = ch.group + "|" + ch.name;
  var st = state.channelStatus[sKey];
  if (!st || !st.lines || !st.lines[lineIdx]) return false;
  var ls = st.lines[lineIdx];
  var count = ls.repairCount || 0;
  if (count >= 3) {
    console.warn("[MyTV] Max repair attempts reached for line " + (lineIdx + 1));
    return false;
  }
  ls.repairCount = count + 1;
  var reason = ls.failReason || "unknown";
  var detail = ls.failDetail || "";

  // 全部失败原第选第修复中第
  var strategy;
  if (reason === "codec") {
    // 编码修复：关闭hls.js用原生播放，部分浏览器支持HLS（如Safari）
    strategy = "native";
  } else if (reason === "hls_error") {
    // HLS播放中锟矫匡拷播放中第锟皆ｏ拷锟劫伙拷第原第
    strategy = count === 1 ? "relaxed" : "native";
  } else if (reason === "media_error") {
    // 媒播放中第原播放中
    strategy = "native";
  } else if (reason === "timeout") {
    // 第时第锟接大缓筹拷重试锟皆ｏ拷第直播重试
    strategy = count === 1 ? "relaxed" : "retry";
  } else {
    // 重试/未知播放中锟皆ｏ拷第原第
    strategy = count === 1 ? "retry" : "native";
  }

  console.log("[MyTV] Repair attempt #" + count + " for line " + (lineIdx + 1) + " reason=" + reason + " strategy=" + strategy);
  showToast("修复中路" + (lineIdx + 1) + " (" + getRepairLabel(reason) + "第" + (strategy === "relaxed" ? "宽松HLS" : strategy === "native" ? "原播放中" : "重试") + ")", "warn");

  state.repairStrategy = strategy;
  state.curLineIdx = lineIdx;
  playLine(ch, lineIdx);
  return true;
}

/* 锟街讹拷重试修复中锟接碉拷重试钮共 */
function manualRepairLine(gi, li) {
  if (gi < 0 || gi >= state.allChannels.length) return;
  var ch = state.allChannels[gi];
  if (li < 0 || li >= ch.urls.length) return;
  state.curChanIdx = gi; state.curLineIdx = li;
  // 重试修复中重试锟矫伙拷锟街讹拷播放中播放中锟皆ｏ拷
  var sKey = ch.group + "|" + ch.name;
  if (state.channelStatus[sKey] && state.channelStatus[sKey].lines && state.channelStatus[sKey].lines[li]) {
    state.channelStatus[sKey].lines[li].repairCount = 0;
  }
  tryRepairLine(ch, li);
  renderChannelList(); updateInfoBar();
}

function destroyHls() { clearTimeout(state.playTimeout); clearTimeout(state.videoCheckTimer); if (state.hls) { state.hls.destroy(); state.hls = null; } videoEl.removeAttribute("src"); videoEl.load(); }

/* ---------- 信息覆盖层更新 ---------- */
function updateInfoBar() {
  if (state.curChanIdx < 0) return;
  var ch = state.allChannels[state.curChanIdx];
  $("info-ch-name").textContent = ch.name;
  var isFav = state.favorites.has(ch.name);
  $("fav-btn").textContent = isFav ? "已收藏" : "收藏";
  if (isFav) $("fav-btn").classList.add("active"); else $("fav-btn").classList.remove("active");
}
function updateOverlay(ch) {
  $("ov-ch-name").textContent = ch.name;
  $("ov-ch-num").textContent = "第" + ch.index + "台";
  $("ov-line").textContent = "线路 " + (state.curLineIdx + 1) + "/" + ch.urls.length;
  showOverlay();
}
function setStatusTag(text, cls) {
  var t = $("status-tag"); t.textContent = text;
  t.className = "info-tag" + (cls ? " " + cls : "");
}
var overlayVisible = false;
function showOverlay() {
  $("overlay").classList.add("show"); overlayVisible = true;
  clearTimeout(state.overlayTimer); state.overlayTimer = setTimeout(hideOverlay, 4000);
}
function hideOverlay() { $("overlay").classList.remove("show"); overlayVisible = false; }
document.addEventListener("mousemove", function() { if (state.curChanIdx >= 0) showOverlay(); });

/* ---------- Loading ---------- */
function showLoading(show, text) {
  clearTimeout(state.loadingTimer);
  if (show) { $("loading-text").textContent = text || "第锟节硷拷第..."; $("loading-mask").classList.add("show"); state.loadingTimer = setTimeout(function() { showLoading(false); }, 15000); }
  else { $("loading-mask").classList.remove("show"); }
}

/* ---------- 视频播放 ---------- */
videoEl.addEventListener("playing", function() {
  clearTimeout(state.playTimeout);
  showLoading(false);
  setStatusTag(state.repairStrategy ? "第锟睫革拷" : "直播第", "live");
  state.repairStrategy = null;
  // 播放成功后清除 playFailed 和 repair 状态
  if (state.curChanIdx >= 0) {
    var ch = state.allChannels[state.curChanIdx];
    var sKey = ch.group + "|" + ch.name;
    if (state.channelStatus[sKey] && state.channelStatus[sKey].lines && state.channelStatus[sKey].lines[state.curLineIdx]) {
      var ls = state.channelStatus[sKey].lines[state.curLineIdx];
      ls.playFailed = false;
      ls.failReason = undefined;
      ls.failDetail = undefined;
      ls.repairCount = 0;
      renderBottomLines(); renderChannelList();
    }
  }
  // 延迟检查：3秒后如果还是失败再确认
  clearTimeout(state.videoCheckTimer);
  state.videoCheckTimer = setTimeout(function() {
    if (videoEl.videoWidth === 0 && videoEl.videoHeight === 0 && state.curChanIdx >= 0) {
      var ch = state.allChannels[state.curChanIdx];
      console.warn("[MyTV] Video track missing for", ch.name, "(audio-only)");
      handleCodecError(ch);
    }
  }, 3000);
});
videoEl.addEventListener("waiting", function() {
  setStatusTag("播放中", "");
});
videoEl.addEventListener("stalled", function() {
  // 重试停锟酵ｏ拷检测10第锟节伙拷没锟街革拷 共 播放中时第锟脚癸拷
  clearTimeout(state.playTimeout);
  state.playTimeout = setTimeout(function() {
    if (state.curChanIdx >= 0 && videoEl.paused && !videoEl.ended) {
      var ch = state.allChannels[state.curChanIdx];
      console.warn("[MyTV] Stalled too long for", ch.name);
      handlePlayError(ch, "timeout", "buffer stalled 10s");
    }
  }, 10000);
});
videoEl.addEventListener("error", function() {
  clearTimeout(state.playTimeout);
  if (state.curChanIdx < 0) return;
  var ch = state.allChannels[state.curChanIdx];
  var err = videoEl.error;
  var errCode = err ? err.code : -1;
  var errMsg = err ? ("code=" + err.code + (err.message ? " " + err.message : "")) : "unknown";
  console.error("[MyTV] Video error:", errMsg, "url=" + (videoEl.currentSrc || videoEl.src));
  // 重试MediaError.code重试: 1=MEDIA_ERR_ABORTED 2=MEDIA_ERR_NETWORK 3=MEDIA_ERR_DECODE 4=MEDIA_ERR_SRC_NOT_SUPPORTED
  var reason = errCode === 3 || errCode === 4 ? "codec" : (errCode === 2 ? "network" : "media_error");
  handlePlayError(ch, reason, errMsg);
});

/* ---------- 快捷键操作 ---------- */
document.addEventListener("keydown", function(e) {
  if (e.target.tagName === "INPUT" || e.target.tagName === "SELECT" || e.target.tagName === "TEXTAREA") return;
  var k = e.key;
  if (/^[0-9]$/.test(k)) { e.preventDefault(); handleDigit(k); return; }
  switch(k) {
    case "ArrowUp": e.preventDefault(); navChan(-1); break;
    case "ArrowDown": e.preventDefault(); navChan(1); break;
    case "ArrowLeft": e.preventDefault(); navGroup(-1); break;
    case "ArrowRight": e.preventDefault(); navGroup(1); break;
    case "Enter": e.preventDefault(); if (state.curChanIdx < 0 && state.allChannels.length) playChannelByGlobalIdx(0); break;
    case "f": case "F": e.preventDefault(); toggleFavorite(); break;
    case "Escape": e.preventDefault(); hideOverlay(); closeSettings(); break;
    case " ": e.preventDefault(); if (videoEl.paused) videoEl.play(); else videoEl.pause(); break;
  }
});
function navChan(dir) {
  if (!state.allChannels.length) return;
  var chans = getCurChans(); if (!chans.length) return;
  var cli = chans.findIndex(function(c) { return state.allChannels.indexOf(c) === state.curChanIdx; });
  cli = ((cli + dir) + chans.length) % chans.length;
  playChannelByGlobalIdx(state.allChannels.indexOf(chans[cli]));
}
function navGroup(dir) {
  if (!state.groups.length) return;
  var next = ((state.curGroupIdx + dir) + state.groups.length) % state.groups.length;
  selectGroup(next);
}

/* ---------- 数字选台 ---------- */
function handleDigit(d) {
  clearTimeout(state.digitTimer);
  state.digitBuf += d; if (state.digitBuf.length > 3) state.digitBuf = d;
  $("dial-number").textContent = padLeft(state.digitBuf, 3);
  $("dial-toast").classList.add("show");
  state.digitTimer = setTimeout(function() {
    var num = parseInt(state.digitBuf, 10); state.digitBuf = "";
    $("dial-toast").classList.remove("show");
    var ch = null;
    for (var j = 0; j < state.allChannels.length; j++) { if (state.allChannels[j].index === num) { ch = state.allChannels[j]; break; } }
    if (ch) playChannelByGlobalIdx(state.allChannels.indexOf(ch));
    else showToast("没有编号 " + num + " 个频道", "warn");
  }, 1500);
}
function padLeft(s, n) { while (s.length < n) s = " " + s; return s; }

/* ---------- 收藏 ---------- */
function toggleFavorite() { if (state.curChanIdx >= 0) toggleFavoriteByName(state.allChannels[state.curChanIdx].name); }
function toggleFavoriteByName(name) {
  if (state.favorites.has(name)) { state.favorites.delete(name); showToast("第取第: " + name, "warn"); }
  else { state.favorites.add(name); showToast("已收藏: " + name, "success"); }
  saveFavorites(); updateInfoBar(); renderSidebar();
}

/* ---------- 全屏/画中画 ---------- */
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    var el = $("player-area");
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  } else {
    if (document.exitFullscreen) document.exitFullscreen();
  }
}
function togglePip() {
  try {
    if (document.pictureInPictureElement) document.exitPictureInPicture();
    else videoEl.requestPictureInPicture();
  } catch(e) { showToast("第锟叫伙拷播放中", "warn"); }
}

/* ---------- 音量控制 ---------- */
function loadVolume() {
  try {
    var v = parseFloat(localStorage.getItem("mytv_volume") || "1");
    var m = localStorage.getItem("mytv_muted") === "true";
    state.volume = isNaN(v) ? 1 : Math.max(0, Math.min(1, v));
    state.isMuted = m;
    applyVolume();
  } catch(e) {}
}
function saveVolume() {
  try { localStorage.setItem("mytv_volume", state.volume); localStorage.setItem("mytv_muted", state.isMuted); } catch(e) {}
}
function applyVolume() {
  videoEl.volume = state.isMuted ? 0 : state.volume;
  $("vol-slider").value = state.isMuted ? 0 : Math.round(state.volume * 100);
  var mb = $("mute-btn");
  mb.textContent = state.isMuted || state.volume === 0 ? "\uD83D\uDD07" : (state.volume < 0.5 ? "\uD83D\uDD09" : "\uD83D\uDD0A");
  if (state.isMuted) mb.classList.add("muted"); else mb.classList.remove("muted");
}
function setVolume(val) {
  state.volume = val / 100;
  state.isMuted = state.volume === 0;
  applyVolume(); saveVolume();
}
function toggleMute() {
  state.isMuted = !state.isMuted;
  if (!state.isMuted && state.volume === 0) { state.volume = 0.5; }
  applyVolume(); saveVolume();
}

/* ---------- 下载（双模式: HLS分片 / 直连流） ---------- */
/* HLS(m3u8): 解析m3u8 → 逐个下载TS分片 → 合并 → 原始画质零损耗
   非HLS(mp4/flv/ts等): 直接fetch流下载 → 零播放影响、零CPU录制开销
   直播流: 轮询m3u8持续抓新分片 / 直连持续读取流直到停止
   VOD 点播: 一次性下载完毕后自动保存 */
function toggleDownload() {
  if (state.dlActive) {
    stopDownload(true);
  } else {
    startDownload();
  }
}

function startDownload() {
  var streamUrl = "";
  if (state.hls && state.hls.url) {
    streamUrl = state.hls.url;
  } else if (state.curChanIdx >= 0) {
    var ch = state.allChannels[state.curChanIdx];
    streamUrl = ch.urls[state.curLineIdx] || ch.urls[0];
  }
  if (!streamUrl) {
    showToast("无法获取播放地址", "error"); return;
  }

  var isHLS = /\.m3u8(\?|$)/i.test(streamUrl) || /\/m3u8/i.test(streamUrl);

  state.dlActive = true;
  state.dlStartTime = Date.now();
  state.dlChunks = [];

  // UI
  $("download-btn").classList.add("recording");
  $("download-btn").innerHTML = '<span id="rec-dot"></span>停止';
  $("rec-indicator").classList.add("show");
  $("rec-timer").textContent = "00:00";
  $("dl-progress").textContent = "";
  updateDlTimer();
  state.dlTimerId = setInterval(updateDlTimer, 1000);

  if (isHLS) {
    state.dlMode = "hls";
    state.dlAborter = new AbortController();
    state.dlTotalSegments = 0;
    state.dlDownloadedSegments = 0;
    state.dlSeenUrls = {};
    state.dlM3u8Url = streamUrl;
    state.dlProxyBase = "";
    state.dlFailedSegments = 0;
    // 检测代理可用性，如有则通过代理下载（绕过CORS）
    checkProxy().then(function(proxyBase) {
      if (!state.dlActive) return;
      if (proxyBase) {
        state.dlProxyBase = proxyBase;
        showToast("开始下载分片 (HLS, 通过代理)...", "success");
      } else {
        showToast("开始下载分片 (HLS, 直连)...", "success");
      }
      downloadLoop(streamUrl);
    }).catch(function() {
      if (!state.dlActive) return;
      showToast("开始下载分片 (HLS, 直连)...", "success");
      downloadLoop(streamUrl);
    });
  } else {
    // 非HLS流: Canvas+AudioContext录制, 不抢源流
    startDirectRecord();
  }
}

function stopDownload(save) {
  state.dlActive = false;

  if (state.dlAborter) {
    try { state.dlAborter.abort(); } catch(e) {}
    state.dlAborter = null;
  }
  if (state.dlPollTimerId) { clearTimeout(state.dlPollTimerId); state.dlPollTimerId = null; }
  if (state.dlTimerId) { clearInterval(state.dlTimerId); state.dlTimerId = null; }

  // 录制模式: 停止 MediaRecorder，onstop 异步处理保存+清理
  if (state.dlMode === "record" && state.dlMediaRecorder) {
    if (state.dlMediaRecorder.state === "recording") {
      state.dlMediaRecorder.requestData();
      state.dlMediaRecorder.stop();
      showToast("正在封装录制文件...", "info");
    } else {
      // recorder 已停止（异常状态），直接清理
      forceCleanDl();
      showToast("录制已中断", "warn");
    }
    // UI 和状态由 onstop 或 forceCleanDl 处理，这里不做
    return;
  }

  // HLS 模式: 直接合并保存
  $("download-btn").classList.remove("recording");
  $("download-btn").innerHTML = '<span id="rec-dot"></span>下载';
  $("rec-indicator").classList.remove("show");

  if (save && state.dlChunks.length > 0) {
    mergeAndSave();
  } else if (save) {
    var msg = "没有下载到任何数据";
    if (state.dlFailedSegments > 0) {
      msg += " (" + state.dlFailedSegments + " 个分片下载失败)";
      if (!state.dlProxyBase) msg += " [未检测到代理，可能存在CORS限制]";
      else msg += " [代理: " + state.dlProxyBase + "]";
    } else {
      msg += " (未获取到任何分片)";
    }
    showToast(msg, "warn");
  }

  state.dlChunks = [];
  state.dlTotalSegments = 0;
  state.dlDownloadedSegments = 0;
  state.dlDownloadedSize = 0;
  state.dlStartTime = null;
  state.dlSeenUrls = null;
  state.dlM3u8Url = "";
  state.dlProxyBase = "";
  state.dlContentType = "";
  state.dlMode = "";
}

/* ===== Canvas+AudioContext 录制 (非HLS流) ===== */
/* 用 Canvas 逐帧绘制 video → captureStream → 配合 AudioContext 捕获音频 → MediaRecorder 编码
   完全不触碰源流，不影响视频播放 */
function startDirectRecord() {
  // 检测 video 是否有有效画面
  if (videoEl.readyState < 2 || videoEl.videoWidth === 0 || videoEl.videoHeight === 0) {
    showToast("视频尚未加载画面，请先等待播放", "warn");
    forceCleanDl(); return;
  }

  state.dlMode = "record";
  state.dlChunks = [];  // 录制数据块
  state.dlRecordedBlob = null;

  // 1. 创建隐藏 Canvas
  var canvas = document.createElement("canvas");
  canvas.width = videoEl.videoWidth;
  canvas.height = videoEl.videoHeight;
  canvas.style.display = "none";
  document.body.appendChild(canvas);
  state.dlRecCanvas = canvas;
  state.dlRecCanvasCtx = canvas.getContext("2d");

  // 2. 从 Canvas 创建视频流 (25fps, 平衡画质和性能)
  var canvasStream;
  try {
    canvasStream = canvas.captureStream(25);
  } catch(e) {
    showToast("浏览器不支持 Canvas 录制", "error");
    forceCleanDl(); return;
  }

  // 3. 获取音频流
  var audioStream = null;
  var combinedStream;
  try {
    audioStream = getRecordAudioStream();
  } catch(e) {
    console.warn("[MyTV] Audio capture failed:", e.message);
    // 音频获取失败也继续，纯视频录制
  }

  // 4. 合并音视频流
  if (audioStream && audioStream.getAudioTracks().length > 0) {
    combinedStream = new MediaStream();
    canvasStream.getVideoTracks().forEach(function(t) { combinedStream.addTrack(t); });
    audioStream.getAudioTracks().forEach(function(t) { combinedStream.addTrack(t); });
  } else {
    combinedStream = canvasStream;
  }

  // 5. 创建 MediaRecorder
  var mimeType = "";
  var mimeOptions = [
    "video/webm;codecs=vp9,opus", "video/webm;codecs=vp8,opus",
    "video/webm;codecs=vp9", "video/webm;codecs=vp8", "video/webm"
  ];
  for (var i = 0; i < mimeOptions.length; i++) {
    if (MediaRecorder.isTypeSupported(mimeOptions[i])) { mimeType = mimeOptions[i]; break; }
  }

  var recorder;
  try {
    recorder = new MediaRecorder(combinedStream, {
      mimeType: mimeType || undefined,
      videoBitsPerSecond: 2500000  // 2.5Mbps
    });
  } catch(e) {
    showToast("浏览器不支持录制编码", "error");
    cleanupRecordResources(); forceCleanDl(); return;
  }

  state.dlMediaRecorder = recorder;
  var chunks = state.dlChunks;

  recorder.ondataavailable = function(e) {
    if (e.data && e.data.size > 0) chunks.push(e.data);
  };

  recorder.onstop = function() {
    if (chunks.length > 0) {
      var blob = new Blob(chunks, { type: recorder.mimeType || "video/webm" });
      state.dlRecordedBlob = blob;
      mergeRecordSave(blob);
    }
    // 清理录制资源
    cleanupRecordResources();
    // 清理下载状态
    $("download-btn").classList.remove("recording");
    $("download-btn").innerHTML = '<span id="rec-dot"></span>下载';
    $("rec-indicator").classList.remove("show");
    if (state.dlTimerId) { clearInterval(state.dlTimerId); state.dlTimerId = null; }
    state.dlChunks = [];
    state.dlStartTime = null;
    state.dlMode = "";
    state.dlActive = false;
  };

  recorder.onerror = function(e) {
    console.error("[MyTV] MediaRecorder error:", e);
    showToast("录制编码出错", "error");
    forceCleanDl();
  };

  // 6. 启动 Canvas 帧绘制
  startCanvasDraw();

  // 7. 启动录制
  try {
    recorder.start(1000); // 每秒分片
  } catch(e) {
    showToast("启动录制失败: " + e.message, "error");
    forceCleanDl(); return;
  }

  showToast("开始录制 (Canvas)...", "success");
}

/* Canvas 逐帧绘制 - 优先 requestVideoFrameCallback, 回退 setInterval 25fps */
function startCanvasDraw() {
  var canvas = state.dlRecCanvas;
  var ctx = state.dlRecCanvasCtx;
  if (!canvas || !ctx) return;

  var drawFrame = function() {
    if (!state.dlActive || !state.dlRecCanvas || !state.dlRecCanvasCtx || !state.dlMediaRecorder) return;
    // 检查 recorder 状态
    if (state.dlMediaRecorder.state !== "recording") return;

    try {
      ctx.drawImage(videoEl, 0, 0, canvas.width, canvas.height);
    } catch(e) {
      // Canvas tainted (跨域), 忽略
    }

    // 继续下一帧
    if (videoEl.requestVideoFrameCallback) {
      state.dlVidCallbackId = videoEl.requestVideoFrameCallback(drawFrame);
    }
  };

  if (videoEl.requestVideoFrameCallback) {
    state.dlVidCallbackId = videoEl.requestVideoFrameCallback(drawFrame);
  } else {
    // 回退: setInterval 25fps
    state.dlRecordInterval = setInterval(drawFrame, 40);
  }
}

/* 获取音频流: 优先 AudioContext (可捕获解码后音频), 回退 captureStream */
function getRecordAudioStream() {
  // 方案1: AudioContext + MediaElementSource (捕获解码后音频, 不影响播放)
  try {
    var AudioCtx = window.AudioContext || window.webkitAudioContext;
    if (AudioCtx) {
      var actx = new AudioCtx();
      state.dlAudioCtx = actx;
      var dest = actx.createMediaStreamDestination();
      state.dlAudioDest = dest;
      var src = actx.createMediaElementSource(videoEl);
      state.dlAudioSrc = src;
      // 同时连接到扬声器 (保持外放) 和录制目标
      src.connect(dest);
      src.connect(actx.destination);
      return dest.stream;
    }
  } catch(e) {
    // AudioContext 失败, 尝试 captureStream
    console.warn("[MyTV] AudioContext failed, trying captureStream:", e.message);
    if (state.dlAudioCtx) { try { state.dlAudioCtx.close(); } catch(ex) {} state.dlAudioCtx = null; }
    if (state.dlAudioSrc) { try { state.dlAudioSrc.disconnect(); } catch(ex) {} state.dlAudioSrc = null; }
    if (state.dlAudioDest) { state.dlAudioDest = null; }
  }

  // 方案2: video.captureStream 音轨
  try {
    var capStream = videoEl.captureStream ? videoEl.captureStream() : null;
    if (capStream && capStream.getAudioTracks().length > 0) {
      return new MediaStream(capStream.getAudioTracks());
    }
  } catch(e) {
    console.warn("[MyTV] captureStream audio failed:", e.message);
  }

  return null;
}

/* 录制完成后保存 */
function mergeRecordSave(blob) {
  if (!blob || blob.size === 0) {
    showToast("录制的文件为空", "warn"); return;
  }

  try {
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.style.display = "none";
    var chName = (state.curChanIdx >= 0) ? state.allChannels[state.curChanIdx].name : "未知";
    a.href = url;
    a.download = "MTV_" + chName.replace(/[\/\\:*?"<>|]/g, "_") + "_" +
      new Date().toISOString().slice(0,19).replace(/:/g,"-") + ".webm";
    document.body.appendChild(a);
    a.click();
    setTimeout(function() { document.body.removeChild(a); URL.revokeObjectURL(url); }, 500);

    var dur = state.dlStartTime ? Math.round((Date.now() - state.dlStartTime) / 1000) : 0;
    var min = Math.floor(dur / 60), sec = dur % 60;
    var sizeMB = (blob.size / 1048576).toFixed(1);
    showToast("已保存(" + sizeMB + "MB): " + a.download + " (" + min + "分" + sec + "秒)", "success");
  } catch(e) {
    console.error("[MyTV] Save recording failed:", e);
    showToast("保存录制文件失败: " + e.message, "error");
  }
}

/* 强制清理下载状态 */
function forceCleanDl() {
  if (state.dlAborter) { try { state.dlAborter.abort(); } catch(e) {} state.dlAborter = null; }
  if (state.dlPollTimerId) { clearTimeout(state.dlPollTimerId); state.dlPollTimerId = null; }
  if (state.dlTimerId) { clearInterval(state.dlTimerId); state.dlTimerId = null; }
  cleanupRecordResources();

  $("download-btn").classList.remove("recording");
  $("download-btn").innerHTML = '<span id="rec-dot"></span>下载';
  $("rec-indicator").classList.remove("show");

  state.dlActive = false; state.dlMode = "";
  state.dlChunks = []; state.dlStartTime = null;
  state.dlDownloadedSize = 0; state.dlContentType = "";
  state.dlProxyBase = ""; state.dlSeenUrls = null;
  state.dlFailedSegments = 0;
}

/* 清理录制资源 (Canvas, AudioContext, MediaRecorder) */
function cleanupRecordResources() {
  // 停止 MediaRecorder
  if (state.dlMediaRecorder) {
    try { if (state.dlMediaRecorder.state === "recording") state.dlMediaRecorder.stop(); } catch(e) {}
    state.dlMediaRecorder = null;
  }
  // 停止 Canvas 绘制
  if (state.dlVidCallbackId) {
    try { videoEl.cancelVideoFrameCallback(state.dlVidCallbackId); } catch(e) {}
    state.dlVidCallbackId = null;
  }
  if (state.dlRecordInterval) { clearInterval(state.dlRecordInterval); state.dlRecordInterval = null; }
  // 移除 Canvas
  if (state.dlRecCanvas) {
    try { if (state.dlRecCanvas.parentNode) state.dlRecCanvas.parentNode.removeChild(state.dlRecCanvas); } catch(e) {}
  }
  state.dlRecCanvas = null; state.dlRecCanvasCtx = null;
  // 断开并关闭 AudioContext
  if (state.dlAudioSrc) {
    try { state.dlAudioSrc.disconnect(); } catch(e) {}
    state.dlAudioSrc = null;
  }
  if (state.dlAudioDest) { state.dlAudioDest = null; }
  if (state.dlAudioCtx) {
    try { state.dlAudioCtx.close(); } catch(e) {}
    state.dlAudioCtx = null;
  }
  state.dlRecordedBlob = null;
}

/* 主下载循环: 拉 m3u8 → 解析分片 → 下载新分片 → VOD完成或直播轮询 */
function downloadLoop(m3u8Url) {
  if (!state.dlActive) return;

  var signal = state.dlAborter ? state.dlAborter.signal : null;
  var fetchUrl = state.dlProxyBase ? (state.dlProxyBase + encodeURIComponent(m3u8Url)) : m3u8Url;

  fetch(fetchUrl, { signal: signal })
    .then(function(r) {
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.text();
    })
    .then(function(content) {
      if (!state.dlActive) return;

      var segments = parseM3U(content, m3u8Url);
      if (!segments || !segments.length) {
        console.warn("[MyTV] No TS segments found in playlist");
        schedulePoll(m3u8Url, 3000);
        return;
      }

      var isLive = !/#EXT-X-ENDLIST/i.test(content);

      var newSegments = [];
      for (var i = 0; i < segments.length; i++) {
        var segUrl = segments[i];
        if (!state.dlSeenUrls[segUrl]) {
          newSegments.push(segUrl);
          state.dlSeenUrls[segUrl] = true;
        }
      }

      state.dlTotalSegments = Math.max(state.dlTotalSegments, segments.length);

      if (newSegments.length === 0) {
        if (isLive) {
          schedulePoll(m3u8Url, 3000);
        } else {
          stopDownload(true);
        }
        return;
      }

      downloadNextBatch(newSegments, 0, signal, function(allFailed) {
        if (!state.dlActive) return;

        updateDlProgress();

        if (isLive) {
          var delay = allFailed ? 4000 : 2000;
          schedulePoll(m3u8Url, delay);
        } else {
          if (state.dlDownloadedSegments >= state.dlTotalSegments) {
            stopDownload(true);
          } else {
            schedulePoll(m3u8Url, 1000);
          }
        }
      });
    })
    .catch(function(err) {
      if (!state.dlActive) return;
      if (err.name === "AbortError") return;

      console.error("[MyTV] m3u8 fetch failed:", err.message);
      if (state.dlActive) {
        schedulePoll(m3u8Url, 5000);
      }
    });
}

/* 逐个下载分片（串行，避免压垮服务器）
   返回: callback(allFailed)  - allFailed=true 表示所有分片都下载失败 */
function downloadNextBatch(urls, idx, signal, callback, allFailed) {
  if (allFailed === undefined) allFailed = true;
  if (idx >= urls.length || !state.dlActive) {
    callback(allFailed);
    return;
  }

  var url = urls[idx];
  if (!url || url.length < 4) {
    state.dlDownloadedSegments++;
    downloadNextBatch(urls, idx + 1, signal, callback, allFailed);
    return;
  }

  var fetchUrl = state.dlProxyBase ? (state.dlProxyBase + encodeURIComponent(url)) : url;

  fetch(fetchUrl, { signal: signal })
    .then(function(r) {
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.arrayBuffer();
    })
    .then(function(buf) {
      if (!state.dlActive) return;
      state.dlChunks.push({ url: url, data: new Uint8Array(buf) });
      state.dlDownloadedSegments++;
      updateDlProgress();
      // 至少有一个成功 → allFailed = false
      downloadNextBatch(urls, idx + 1, signal, callback, false);
    })
    .catch(function(err) {
      if (!state.dlActive) return;
      if (err.name === "AbortError") return;

      state.dlFailedSegments++;
      console.warn("[MyTV] Segment download failed (" + (idx+1) + "/" + urls.length + "):", err.message);
      updateDlProgress();
      downloadNextBatch(urls, idx + 1, signal, callback, allFailed);
    });
}

/* 安排下次轮询 m3u8 */
function schedulePoll(m3u8Url, delay) {
  if (!state.dlActive) return;
  if (state.dlPollTimerId) clearTimeout(state.dlPollTimerId);
  state.dlPollTimerId = setTimeout(function() {
    state.dlPollTimerId = null;
    downloadLoop(m3u8Url);
  }, delay || 3000);
}

/* 解析 m3u8 播放列表，返回 TS 分片 URL 数组 */
function parseM3U(content, baseUrl) {
  var lines = content.split(/\r?\n/);
  var segments = [];
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i].trim();
    if (!line || line[0] === "#") continue;
    if (/\.ts(\?.*)?$/i.test(line)) {
      segments.push(resolveUrl(line, baseUrl));
    }
  }
  return segments;
}

/* 解析相对 URL */
function resolveUrl(url, base) {
  if (/^https?:\/\//i.test(url)) return url;
  if (url[0] === "/") {
    var m = base.match(/^(https?:\/\/[^\/]+)/);
    return (m ? m[1] : "") + url;
  }
  var baseClean = base.replace(/\?.*$/, "").replace(/\/[^\/]*$/, "");
  while (/^\.\.\//.test(url)) {
    url = url.substring(3);
    var idx = baseClean.lastIndexOf("/");
    if (idx === -1) break;
    baseClean = baseClean.substring(0, idx);
  }
  return baseClean + "/" + url;
}

/* 合并所有分片并触发下载 */
function mergeAndSave() {
  if (!state.dlChunks.length) {
    showToast("没重试锟截碉拷第片重试", "warn"); return;
  }

  try {
    // 锟较诧拷第共 Uint8Array
    var totalSize = 0;
    for (var i = 0; i < state.dlChunks.length; i++) {
      totalSize += state.dlChunks[i].data.length;
    }

    var merged = new Uint8Array(totalSize);
    var offset = 0;
    for (var i = 0; i < state.dlChunks.length; i++) {
      merged.set(state.dlChunks[i].data, offset);
      offset += state.dlChunks[i].data.length;
    }

    var blob = new Blob([merged], { type: "video/mp2t" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.style.display = "none";
    var chName = (state.curChanIdx >= 0) ? state.allChannels[state.curChanIdx].name : "重试";
    a.href = url;
    a.download = "MTV_" + chName.replace(/[\/\\:*?"<>|]/g, "_") + "_" +
      new Date().toISOString().slice(0,19).replace(/:/g,"-") + ".ts";
    document.body.appendChild(a);
    a.click();
    setTimeout(function() { document.body.removeChild(a); URL.revokeObjectURL(url); }, 500);

    var dur = state.dlStartTime ? Math.round((Date.now() - state.dlStartTime) / 1000) : 0;
    var min = Math.floor(dur / 60), sec = dur % 60;
    var sizeMB = (totalSize / 1048576).toFixed(1);
    showToast("锟窖憋拷第(" + sizeMB + "MB): " + a.download + " (" + min + "第" + sec + "第)", "success");
  } catch(e) {
    console.error("[MyTV] Merge failed:", e);
    showToast("锟较诧拷第片失第: " + e.message, "error");
  }
}

/* 更新下载进度 */
function updateDlProgress() {
  var el = $("dl-progress");
  if (!el) return;
  if (state.dlMode === "record") {
    // 录制模式: 显示已录制数据大小
    var totalSize = 0;
    for (var i = 0; i < state.dlChunks.length; i++) {
      totalSize += (state.dlChunks[i] && state.dlChunks[i].size) || 0;
    }
    var mb = (totalSize / 1048576).toFixed(1);
    el.textContent = " " + mb + "MB";
  } else if (state.dlDownloadedSegments > 0) {
    var total = state.dlTotalSegments || "?";
    var txt = " (" + state.dlDownloadedSegments + "/" + total + ")";
    if (state.dlFailedSegments > 0) txt += " 失败" + state.dlFailedSegments;
    el.textContent = txt;
  } else if (state.dlFailedSegments > 0) {
    el.textContent = " (0/" + (state.dlTotalSegments || "?") + ") 失败" + state.dlFailedSegments;
  } else {
    el.textContent = "";
  }
}

function updateDlTimer() {
  if (!state.dlStartTime) return;
  var dur = Math.round((Date.now() - state.dlStartTime) / 1000);
  var min = ("0" + Math.floor(dur / 60)).slice(-2);
  var sec = ("0" + (dur % 60)).slice(-2);
  $("rec-timer").textContent = min + ":" + sec;
}

/* ---------- 编码检测 ---------- */
/* 编码兼容性检测 */
function getCodecLabel(codec) {
  if (!codec) return "?";
  var c = codec.toLowerCase();
  // H.264/AVC
  if (c.indexOf("avc1") >= 0 || c.indexOf("avc3") >= 0 || c.indexOf("h264") >= 0) {
    var m = c.match(/avc[13]\.([0-9A-F]{2})/i);
    if (m) {
      var lv = parseInt(m[1], 16);
      if (lv >= 0x64) return "H.264 High";
      if (lv >= 0x42) return "H.264 Main";
      return "H.264";
    }
    return "H.264";
  }
  // HEVC/H.265
  if (c.indexOf("hvc1") >= 0 || c.indexOf("hev1") >= 0 || c.indexOf("hevc") >= 0 || c.indexOf("h265") >= 0) return "HEVC";
  // AV1
  if (c.indexOf("av01") >= 0 || c.indexOf("av1") >= 0) return "AV1";
  // VP9
  if (c.indexOf("vp09") >= 0 || c.indexOf("vp9") >= 0) return "VP9";
  // VP8
  if (c.indexOf("vp8") >= 0 || c.indexOf("vp08") >= 0) return "VP8";
  // MPEG-4 Visual
  if (c.indexOf("mp4v") >= 0) return "MP4V";
  // 第取前8锟街凤拷重试
  return codec.substring(0, 10);
}

/* 编码兼容性检测 */
function isCodecSupported(codec) {
  if (!codec || typeof MediaSource === "undefined" || !MediaSource.isTypeSupported) return null; // 锟睫凤拷锟叫讹拷
  // 重试模第MIME检测
  var mimes = [
    'video/mp4; codecs="' + codec + '"',
    'video/webm; codecs="' + codec + '"'
  ];
  for (var i = 0; i < mimes.length; i++) {
    try { if (MediaSource.isTypeSupported(mimes[i])) return true; } catch(e) {}
  }
  return false;
}

/* 从 HLS manifest 中提取编码信息 */
function saveLineCodec(ch, codec) {
  if (!codec) return;
  var sKey = ch.group + "|" + ch.name;
  if (!state.channelStatus[sKey]) state.channelStatus[sKey] = { lines: [] };
  var arr = state.channelStatus[sKey].lines;
  while (arr.length <= state.curLineIdx) arr.push({});
  arr[state.curLineIdx].codec = codec;
  arr[state.curLineIdx].codecUnsupported = (isCodecSupported(codec) === false);
  renderBottomLines();
}
function escHtml(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function escAttr(s) { return s.replace(/\\/g,"\\\\").replace(/'/g,"\\'").replace(/"/g,"&quot;"); }

  var isMobile = window.matchMedia("(max-width: 768px)").matches;

  if (isMobile) {
    // 锟狡讹拷锟剿ｏ拷重试模式第共 sidebar-visible
    var visible = main.classList.toggle("sidebar-visible");
    if (visible) {
      main.classList.remove("sidebar-hidden");
      bar.title = "第个频道第";
    } else {
      main.classList.add("sidebar-hidden");
      bar.title = "展个频道第";
    }
  } else {
    // 重试耍播放中第示/重试
    main.classList.toggle("sidebar-hidden");
    if (main.classList.contains("sidebar-hidden")) { bar.title = "展个频道第"; }
    else { bar.title = "第个频道第"; }
  }
}

/* ---------- 初始化 ---------- */
</script>
</body>
</html>
